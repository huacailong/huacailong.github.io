- title: Experience
  type: time_table
  contents:
    - title: HUMBI, Pose-Guided Human Rendering Challenge
      institution: University of Minnesota - twin cities campus, Minnesota, US 
      year: 09/2021 - 12/2021
      description:
        - Pose-guided person image generation, which is to synthesize a realistic image of the person with the target pose based on a source image showing the person with a given pose
        - Used a hybrid model by combining the pose transfer framework with the XingGAN aiming to get a performance improvement.
        - Found out our method has advantages in pose transfer of the person, but not on backgrounds.
        
    - title: A Research on Performance Discrepancy for Varying Fine-tuning Layers and Pooling Strategies of BERT
      institution: University of Minnesota - twin cities campus, Minnesota, US 
      year: 09/2020 - 12/2020
      description:
        - Investigate how different fine-tuning layers and pooling strategies will influence the performance of BERT model.
        - Found that its possible to improve performance when different kinds of finetune layers are added for information post-processing from hidden states of BERT.
        
    - title: Robust control for Self-erecting Inverted Pendulum (SESIP)
      institution: University of Minnesota - twin cities campus, Minnesota, US 
      year: 02/2020 - 05/2020
      description:
        - Stabilized and tracked control of the unstable self-erecting single inverted pendulum (SESIP).
        - Implemented double PID control, LQR control, H∞ and μ−synthesis control to analyze the robustness and uncertainty of the system.
        
    - title: Automating Flappy Bird using Deep Q-Learning
      institution: University of Minnesota - twin cities campus, Minnesota, US 
      year: 09/2019 - 12/2019
      description:
        - The bird is our agent and environment consists of obstacles in form of pipes of different heights.
        - Applied and implemented modern Reinforcement Learning technique to automate Flappy Bird game to navigate to maximize its score in the end.

    - title: Stochastic Models for Intra-cellular Cargo Transport
      institution: University of Minnesota - twin cities campus, Minnesota, US 
      year: 11/2019 - 12/2019
      description:
        - Modelled the cargo transport process as a combination of free diffusion and motor based transport.
        - Obtained time-evolution of the position and velocity of the cargo.

    - title: Tianjin University-Adaptive Control Algorithm Lab 
      institution: Tianjin Univeristy, Tianjin, China
      year: 2018-2019
      description: 
        - Attended the courses including Intelligent Robot System (Perception, Navigation and Control) and Predictive Control to consolidate foundation.
        - Participated in adaptive algorithms-related research with group members.

    - title: Harbin Institute of Technology (HIT)-UAV Lab
      institution: Harbin Institute of Technology, Harbin, China
      year: 08/2018
      description:
        - Familiarized with different types of Unmanned Aerial Vehicles (UVA), and conducted flight mechanics research on quadrotor UAV and fixed-wing UAV.
        - Learned the sensors and actuators of UAV, drew Printed Circuit Board (PCB) with Kicard and designed flight control systems.
        - Learned MEMS related devices and mastered the skills of measuring zero offset and corresponding parameters of devices, for example, gyroscope and accelerometer.
        - Conducted UVA modeling using Simulink and simulated the landing process,and adjusted the PID value to determine the optimal controller.
        - Assembled a quadrotor UAV, and used Mission Planner software to calibrate UAV and remote controller.
 
    - title: Projects at Imperial College London
      institution: Imperial College London, London, UK 
      year: 2016-2017
      description:
        - title: Synthetic Inertia Provision by Coordinating Wind Turbines in a Wind Farm
          contents:
            - Designed the mechanical models of a single wind turbine.
            - Designed a wind farm model connected to the electrical grid through interface model.
            - Applied the approach to release part of the kinetic energy stored in the rotating shafts by slowing the turbines to generate extra power when frequency changes.
        
        - title: Modeling and Control of Inverted Pendulum
          contents:
            - Conducted inverted pendulum modeling with Euler-Lagrange equation and obtained a non-linear model.
            - Linearized non-linear model and designed a controller with the model in Simulink.
            - Adopted traditional closed-loop control to stabilize the inverted pendulum on the highest point and used model predictive control (MPC) to track a predetermined loop.
            - Converted continuous-time system to discrete-time system and then designed the controller.
            - Compared discrete-time and continuous-time systems, and realized the importance of the sampling time.
            
        - title: Multivariable Design of the HI-MAT Experimental Aircraft 
          contents:
            - Learned the a lightly damped beam example to master its properties, including performance, robustness, sensitivity and designed controller by $H_\infty$ Design.
            - Performed control design of HI-MAT experimental aircraft and compared different controllers.
            
        - title: System Identification on the Stationary Process Generated by a Dynamic System
          contents:
            - Conducted theoretical analysis on the stationary process, established AR models by calculating the average value, variance and covariance, and showed theoretically the identification capabilities of AR models of increasing order.
            - Performed a simulation with Matlab to obtain the actual parameters.   
            - Compared theoretical findings with empirical estimates obtained by Least Squares (LS) techniques and showed the effects of colored noise on the LS estimates.
            
        - title: Modeling and Control of Multibody Mechanical Systems
          contents:
            - Conducted force analysis on the spring connected to the wheels of grocery trolleys and obtained non-linear model.   
            - Linearized non-linear model and observed its stability, robustness and other features.
                  
